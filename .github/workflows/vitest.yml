name: Unit tests
on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Run vitest tests
        run: npm run test:unit